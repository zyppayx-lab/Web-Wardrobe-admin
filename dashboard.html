<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Wardrobe Admin Dashboard</title><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
font-size:24px;
}

.logout{
background:#e60023;
color:white;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
text-align:center;
}

.card h2{
font-size:32px;
margin-bottom:10px;
color:#e60023;
}

.card p{
color:#666;
font-weight:600;
}

.actions{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.action-btn{
background:#111;
color:white;
padding:12px 18px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

.action-btn:hover{
opacity:.9;
}
</style></head><body><header>
<h1>Web Wardrobe Admin</h1>
<button class="logout" id="logoutBtn">
Logout
</button>
</header><div class="container"><div class="grid"><div class="card">
<h2 id="subscriberCount">0</h2>
<p>Newsletter Subscribers</p>
</div><div class="card">
<h2 id="businessUserCount">0</h2>
<p>Business Users</p>
</div><div class="card">
<h2 id="pendingCount">0</h2>
<p>Pending Submissions</p>
</div><div class="card">
<h2 id="approvedCount">0</h2>
<p>Approved Posts</p>
</div><div class="card">
<h2 id="revenueCount">₦0</h2>
<p>Sponsored Revenue</p>
</div></div><div class="actions"><a href="management.html" class="action-btn">
Manage Submissions
</a><a href="../index.html" class="action-btn">
View Website
</a></div></div><script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
getDocs,
query,
where
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyBoSJggPoHfiI2quek_5mV5gPSAhSaXFZE",
authDomain:"web-wardrobe.firebaseapp.com",
projectId:"web-wardrobe",
storageBucket:"web-wardrobe.appspot.com",
messagingSenderId:"201587857341",
appId:"1:201587857341:web:044fe04f2503168881a4d4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAILS = [
"admin@webwardrobe.name.ng"
];

onAuthStateChanged(auth, async(user)=>{

if(!user){
location.href="login.html";
return;
}

if(!ADMIN_EMAILS.includes(user.email)){
await signOut(auth);
location.href="login.html";
return;
}

loadDashboard();

});

async function loadDashboard(){

const subscribers =
await getDocs(
collection(db,"newsletterSubscribers")
);

document.getElementById("subscriberCount").textContent =
subscribers.size;

const businessUsers =
await getDocs(
collection(db,"businessUsers")
);

document.getElementById("businessUserCount").textContent =
businessUsers.size;

const pending =
await getDocs(
query(
collection(db,"businessSubmissions"),
where("status","==","pending")
)
);

document.getElementById("pendingCount").textContent =
pending.size;

const approved =
await getDocs(
query(
collection(db,"businessSubmissions"),
where("status","==","approved")
)
);

document.getElementById("approvedCount").textContent =
approved.size;

let revenue = 0;

approved.forEach(docSnap=>{

const data = docSnap.data();

if(data.promotionType === "sponsored"){
revenue += 2500;
}

});

document.getElementById("revenueCount").textContent =
"₦" + revenue.toLocaleString();

}

document
.getElementById("logoutBtn")
.addEventListener("click",async()=>{

await signOut(auth);

location.href="login.html";

});

</script></body>
  </html>
