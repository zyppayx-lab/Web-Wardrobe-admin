<!DOCTYPE html><html>
<head>
<title>Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.card{
background:white;
margin-bottom:15px;
padding:15px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
}

.approve{
background:green;
color:white;
}

.reject{
background:red;
color:white;
}

img{
max-width:250px;
border-radius:10px;
margin-top:10px;
}

a{
display:inline-block;
margin-bottom:20px;
}
</style></head>
<body><h2>Post Management</h2><a href="dashboard.html">← Back to Dashboard</a>

<div id="list"></div><script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
getDocs,
doc,
getDoc,
setDoc,
updateDoc,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyBoSJggPoHfiI2quek_5mV5gPSAhSaXFZE",
authDomain:"web-wardrobe.firebaseapp.com",
projectId:"web-wardrobe",
storageBucket:"web-wardrobe.appspot.com",
messagingSenderId:"201587857341",
appId:"1:201587857341:web:044fe04f2503168881a4d4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "admin@webwardrobe.name.ng";

onAuthStateChanged(auth,(user)=>{

if(!user){
location.href="login.html";
return;
}

if(user.email !== ADMIN_EMAIL){
alert("Access denied");
location.href="login.html";
return;
}

load();

});

async function load(){

const list = document.getElementById("list");

list.innerHTML = "Loading...";

const snap = await getDocs(
collection(db,"businessSubmissions")
);

list.innerHTML = "";

snap.forEach(d=>{

const data = d.data();

const div = document.createElement("div");

div.className = "card";

div.innerHTML = `
<h3>${data.title || ""}</h3>

<p>
<b>Category:</b> ${data.category || ""}
</p>

<p>
<b>Status:</b> ${data.status || "pending"}
</p>

<p>
<b>Email:</b> ${data.email || ""}
</p>

<p>
<b>Promotion:</b>
${data.promotionType || "affiliate"}
</p>

${data.promotionType === "sponsored"
? `<p><b>Sponsored Post (₦2500)</b></p>`
: `<p><b>Affiliate Post (Free)</b></p>`
}

${data.paymentProof
? `<img src="${data.paymentProof}">`
: ""
}

<br>

<button
class="approve"
onclick="approveSubmission('${d.id}')">
Approve
</button>

<button
class="reject"
onclick="rejectSubmission('${d.id}')">
Reject
</button>
`;

list.appendChild(div);

});

}

window.approveSubmission = async function(id){

const ref = doc(
db,
"businessSubmissions",
id
);

const snap = await getDoc(ref);

if(!snap.exists()){
alert("Submission not found");
return;
}

const data = snap.data();

await setDoc(
doc(db,"posts",id),
{
title:data.title,
category:data.category,
shortDescription:data.shortDescription,
longDescription:data.longDescription,
media:data.media || [],
affiliateLink:data.affiliateLink || "",
websiteUrl:data.websiteUrl || "",
isSponsored:
data.promotionType === "sponsored",
views:0,
status:"published",
createdAt:serverTimestamp()
}
);

await updateDoc(ref,{
status:"approved"
});

alert("Post approved and published");

load();

};

window.rejectSubmission = async function(id){

await updateDoc(
doc(db,"businessSubmissions",id),
{
status:"rejected"
}
);

alert("Post rejected");

load();

};

</script></body>
</html>
