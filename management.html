<!DOCTYPE html>
<html>
<head>
<title>Web Wardrobe CMS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.topbar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

img{
max-width:100%;
border-radius:10px;
margin-top:10px;
}

input, textarea{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:1px solid #ddd;
}

.small{font-size:13px;color:#666;}

.approve{background:green;color:white;}
.reject{background:red;color:white;}
.edit{background:#111;color:white;}
.view{background:#007bff;color:white;}
.save{background:orange;color:white;}
.tab-active{background:#111;color:white;}
</style>
</head>

<body>

<h2>Web Wardrobe CMS Panel</h2>

<div class="topbar">
<button onclick="loadTab('pending')">Pending</button>
<button onclick="loadTab('published')">Published</button>
<button onclick="loadTab('rejected')">Rejected</button>
</div>

<div id="list">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
getFirestore,
collection,
query,
where,
getDocs,
doc,
getDoc,
updateDoc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBoSJggPoHfiI2quek_5m5GPSAhSaXFZE",
authDomain: "web-wardrobe.firebaseapp.com",
projectId: "web-wardrobe",
storageBucket: "web-wardrobe.appspot.com",
messagingSenderId: "201587857341",
appId: "1:201587857341:web:044fe04f2503168881a4d4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "admin@webwardrobe.name.ng";

/* AUTH */
onAuthStateChanged(auth,(user)=>{
if(!user || user.email !== ADMIN_EMAIL){
location.href="login.html";
return;
}
loadTab("pending");
});

/* SLUG */
function slugify(text){
return text.toLowerCase()
.trim()
.replace(/[^a-z0-9\s-]/g,"")
.replace(/\s+/g,"-")
.replace(/-+/g,"-");
}

function makeSlug(title,id){
return `${slugify(title)}-${id.slice(0,6)}`;
}

/* TAB SYSTEM */
window.loadTab = async function(tab){

const list = document.getElementById("list");
list.innerHTML = "Loading...";

let snap;

if(tab === "published"){
snap = await getDocs(collection(db,"posts"));
} else {
snap = await getDocs(
query(collection(db,"businessSubmissions"), where("status","==",tab))
);
}

list.innerHTML = "";

if(snap.empty){
list.innerHTML = "<p>No data found.</p>";
return;
}

snap.forEach(d=>{

const data = d.data();
const isPublished = tab === "published";

const div = document.createElement("div");
div.className = "card";

div.innerHTML = `
<h3>${data.title}</h3>

<p class="small">Category: ${data.category || ""}</p>
<p class="small">Status: ${data.status || (isPublished ? "published" : "")}</p>

${data.slug ? `<p class="small"><b>Slug:</b> ${data.slug}</p>` : ""}

<h4>Short</h4>
<p>${data.shortDescription || ""}</p>

<h4>Full</h4>
<p>${data.longDescription || ""}</p>

${data.media?.[0] ? `<img src="${data.media[0]}">` : ""}

${data.websiteUrl ? `<a href="${data.websiteUrl}" target="_blank">Open Link</a>` : ""}

${!isPublished ? `
<input id="reject-${d.id}" placeholder="Reject reason">

<button class="view" onclick="window.open('${data.websiteUrl || ""}','_blank')">Check</button>
<button class="approve" onclick="approvePost('${d.id}')">Approve</button>
<button class="reject" onclick="rejectPost('${d.id}')">Reject</button>
<button class="edit" onclick="editPost('${d.id}')">Edit</button>
` : `
<button class="view" onclick="window.open('${data.websiteUrl || ""}','_blank')">View Live</button>
`}
`;

list.appendChild(div);

});

};

/* APPROVE */
window.approvePost = async function(id){

const ref = doc(db,"businessSubmissions",id);
const snap = await getDoc(ref);

if(!snap.exists()) return;

const d = snap.data();

const slug = d.slug || makeSlug(d.title,id);

await setDoc(doc(db,"posts",id),{
title:d.title,
slug,
category:(d.category||"lifestyle").toLowerCase(),
shortDescription:d.shortDescription,
longDescription:d.longDescription,
media:d.media||[],
websiteUrl:d.websiteUrl||"",
affiliateLink:d.affiliateLink||"",
status:"published",
views:0,
createdAt:Date.now()
});

await updateDoc(ref,{
status:"approved",
slug
});

alert("Published");
loadTab("pending");
};

/* REJECT */
window.rejectPost = async function(id){

const reason = document.getElementById(`reject-${id}`).value;

await updateDoc(doc(db,"businessSubmissions",id),{
status:"rejected",
rejectReason:reason || "No reason"
});

loadTab("pending");
};

/* EDIT (simple inline save) */
window.editPost = async function(id){

const ref = doc(db,"businessSubmissions",id);
const snap = await getDoc(ref);

if(!snap.exists()) return;

const d = snap.data();

const newTitle = prompt("Edit title", d.title);
if(!newTitle) return;

await updateDoc(ref,{
title:newTitle
});

alert("Updated");
loadTab("pending");
};

</script>

</body>
</html>
