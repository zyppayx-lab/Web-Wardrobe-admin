<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post Management | Web Wardrobe</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.card{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

img{
max-width:250px;
border-radius:10px;
margin-top:10px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
}

.approve{background:green;color:white;}
.reject{background:red;color:white;}
.edit{background:#111;color:white;}
.save{background:#007bff;color:white;}

input, textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ddd;
}

textarea{min-height:80px;}

a{
display:inline-block;
margin-top:5px;
color:#007bff;
word-break:break-all;
}

.badge{
display:inline-block;
padding:4px 10px;
border-radius:20px;
font-size:12px;
background:#eee;
margin-bottom:8px;
}
</style>
</head>

<body>

<h2>Post Review Dashboard</h2>
<p>Full moderation control panel</p>

<div id="list">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
query,
getDocs,
doc,
updateDoc,
deleteDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyBoSJggPoHfiI2quek_5mV5gPSAhSaXFZE",
authDomain:"web-wardrobe.firebaseapp.com",
projectId:"web-wardrobe",
storageBucket:"web-wardrobe.appspot.com",
messagingSenderId:"201587857341",
appId:"1:201587857341:web:044fe04f2503168881a4d4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "admin@webwardrobe.name.ng";

onAuthStateChanged(auth,(user)=>{
if(!user){
location.href="login.html";
return;
}

if(user.email !== ADMIN_EMAIL){
alert("Access denied");
location.href="login.html";
return;
}

loadPosts();
});

async function loadPosts(){

const list = document.getElementById("list");
list.innerHTML = "Loading...";

const snap = await getDocs(collection(db,"posts"));

list.innerHTML = "";

snap.forEach(docSnap=>{
const data = docSnap.data();

const div = document.createElement("div");
div.className = "card";

div.innerHTML = `
<div class="badge">Status: ${data.status || "unknown"}</div>

<h3 contenteditable="true" id="title-${docSnap.id}">${data.title || ""}</h3>

<p><b>Category:</b> ${data.category || ""}</p>

<p><b>Slug:</b> ${data.slug || "❌ missing"}</p>

<img src="${data.media?.[0] || ''}">

<p><b>Short Description:</b></p>
<textarea id="short-${docSnap.id}">${data.shortDescription || ""}</textarea>

<p><b>Full Content:</b></p>
<textarea id="long-${docSnap.id}">${data.longDescription || ""}</textarea>

<p><b>Affiliate Link:</b></p>
<a href="${data.affiliateLink || '#'}" target="_blank">${data.affiliateLink || "none"}</a>

<p><b>Website Link:</b></p>
<a href="${data.websiteUrl || '#'}" target="_blank">${data.websiteUrl || "none"}</a>

${data.paymentProof ? `
<p><b>Payment Proof:</b></p>
<img src="${data.paymentProof}">
` : ""}

${data.rejectionReason ? `
<p style="color:red;"><b>Rejection Reason:</b> ${data.rejectionReason}</p>
` : ""}

<div>

<button class="approve" onclick="approve('${docSnap.id}')">Approve</button>

<button class="reject" onclick="reject('${docSnap.id}')">Reject</button>

<button class="edit" onclick="saveEdit('${docSnap.id}')">Save Edits</button>

</div>
`;

list.appendChild(div);
});
}

window.saveEdit = async function(id){

const title = document.getElementById(`title-${id}`).innerText;
const short = document.getElementById(`short-${id}`).value;
const long = document.getElementById(`long-${id}`).value;

await updateDoc(doc(db,"posts",id),{
title,
shortDescription: short,
longDescription: long,
updatedAt: serverTimestamp()
});

alert("Post updated");
loadPosts();
};

window.approve = async function(id){

await updateDoc(doc(db,"posts",id),{
status:"published",
rejectionReason:""
});

alert("Approved");
loadPosts();
};

window.reject = async function(id){

const reason = prompt("Enter rejection reason:");

await updateDoc(doc(db,"posts",id),{
status:"rejected",
rejectionReason: reason || "No reason provided"
});

alert("Rejected");
loadPosts();
};

</script>

</body>
</html>
