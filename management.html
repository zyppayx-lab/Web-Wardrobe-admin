<!DOCTYPE html>
<html>
<head>
<title>Web Wardrobe CMS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.topbar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

img{
max-width:100%;
border-radius:10px;
margin-top:10px;
}

input, textarea, select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:1px solid #ddd;
}

.small{font-size:13px;color:#666;}

.approve{background:green;color:white;}
.reject{background:red;color:white;}
.edit{background:#111;color:white;}
.view{background:#007bff;color:white;}
.save{background:orange;color:white;}
</style>
</head>

<body>

<h2>Web Wardrobe CMS Panel</h2>

<div class="topbar">
<button onclick="loadPosts('pending')">Pending</button>
<button onclick="loadPosts('published')">Published</button>
<button onclick="loadPosts('rejected')">Rejected</button>
</div>

<div id="list">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
getFirestore,
collection,
query,
where,
getDocs,
doc,
getDoc,
updateDoc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBoSJggPoHfiI2quek_5mV5gPSAhSaXFZE",
authDomain: "web-wardrobe.firebaseapp.com",
projectId: "web-wardrobe",
storageBucket: "web-wardrobe.appspot.com",
messagingSenderId: "201587857341",
appId: "1:201587857341:web:044fe04f2503168881a4d4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "admin@webwardrobe.name.ng";

/* AUTH FIX */
onAuthStateChanged(auth,(user)=>{
if(!user){
location.href="login.html";
return;
}
if(user.email !== ADMIN_EMAIL){
alert("Access denied");
location.href="login.html";
return;
}
loadPosts("pending");
});

/* SLUG */
function slugify(text){
return text.toLowerCase()
.trim()
.replace(/[^a-z0-9\s-]/g,"")
.replace(/\s+/g,"-")
.replace(/-+/g,"-");
}

function generateSlug(title,id){
return `${slugify(title)}-${id.slice(0,5)}`;
}

/* LOAD POSTS */
window.loadPosts = async function(status){

const list = document.getElementById("list");
list.innerHTML = "Loading...";

const q = query(
collection(db,"businessSubmissions"),
where("status","==",status)
);

const snap = await getDocs(q);

list.innerHTML = "";

if(snap.empty){
list.innerHTML = "<p>No posts found.</p>";
return;
}

snap.forEach(d=>{

const data = d.data();

const div = document.createElement("div");
div.className = "card";

div.innerHTML = `
<h3>${data.title}</h3>

<p class="small">Category: ${data.category}</p>
<p class="small">Email: ${data.email}</p>
<p class="small">Status: ${data.status}</p>

<input id="title-${d.id}" value="${data.title}">
<input id="slug-${d.id}" value="${data.slug || ""}">

<textarea id="short-${d.id}">${data.shortDescription || ""}</textarea>
<textarea id="long-${d.id}">${data.longDescription || ""}</textarea>

<img src="${data.media?.[0] || ""}">

<input id="website-${d.id}" value="${data.websiteUrl || ""}">
<input id="affiliate-${d.id}" value="${data.affiliateLink || ""}">

${data.paymentProof ? `<img src="${data.paymentProof}">` : ""}

<input id="reject-${d.id}" placeholder="Reject reason">

<button class="view" onclick="openLink('${data.websiteUrl || ""}')">Check Link</button>
<button class="approve" onclick="approve('${d.id}')">Approve</button>
<button class="reject" onclick="reject('${d.id}')">Reject</button>
<button class="edit" onclick="saveEdit('${d.id}')">Save Edit</button>
`;

list.appendChild(div);

});

};

/* OPEN LINK */
window.openLink = function(url){
if(!url) return alert("No URL");
window.open(url,"_blank");
};

/* APPROVE */
window.approve = async function(id){

const ref = doc(db,"businessSubmissions",id);
const snap = await getDoc(ref);

if(!snap.exists()) return;

const d = snap.data();

const slug = d.slug || generateSlug(d.title,id);

/* publish */
await setDoc(doc(db,"posts",id),{
title:d.title,
slug,
category:(d.category||"lifestyle").toLowerCase(),
shortDescription:d.shortDescription,
longDescription:d.longDescription,
media:d.media||[],
affiliateLink:d.affiliateLink||"",
websiteUrl:d.websiteUrl||"",
isSponsored:d.promotionType==="sponsored",
status:"published",
views:0,
createdAt:Date.now()
});

await updateDoc(ref,{
status:"approved",
slug
});

alert("Published with slug: "+slug);
loadPosts("pending");
};

/* SAVE EDIT (NEW CMS POWER FEATURE) */
window.saveEdit = async function(id){

const ref = doc(db,"businessSubmissions",id);

await updateDoc(ref,{
title: document.getElementById(`title-${id}`).value,
slug: document.getElementById(`slug-${id}`).value,
shortDescription: document.getElementById(`short-${id}`).value,
longDescription: document.getElementById(`long-${id}`).value,
websiteUrl: document.getElementById(`website-${id}`).value,
affiliateLink: document.getElementById(`affiliate-${id}`).value
});

alert("Changes saved");
loadPosts("pending");
};

/* REJECT */
window.reject = async function(id){

const reason = document.getElementById(`reject-${id}`).value;

await updateDoc(doc(db,"businessSubmissions",id),{
status:"rejected",
rejectReason:reason||"No reason"
});

alert("Rejected");
loadPosts("pending");
};

</script>

</body>
</html>
