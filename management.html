<!DOCTYPE html><html>
<head>
<title>Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

img{
max-width:300px;
margin-top:10px;
border-radius:10px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
}

.approve{
background:green;
color:white;
}

.reject{
background:red;
color:white;
}

a{
display:inline-block;
margin-bottom:20px;
}
</style></head>
<body><h2>Pending Business Submissions</h2><a href="dashboard.html">← Back to Dashboard</a>

<div id="list">Loading...</div><script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
query,
where,
getDocs,
doc,
getDoc,
setDoc,
updateDoc,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyBoSJggPoHfiI2quek_5mV5gPSAhSaXFZE",
authDomain:"web-wardrobe.firebaseapp.com",
projectId:"web-wardrobe",
storageBucket:"web-wardrobe.appspot.com",
messagingSenderId:"201587857341",
appId:"1:201587857341:web:044fe04f2503168881a4d4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "admin@webwardrobe.name.ng";

onAuthStateChanged(auth,(user)=>{

if(!user){
location.href="login.html";
return;
}

if(user.email !== ADMIN_EMAIL){
alert("Access denied");
location.href="login.html";
return;
}

loadPending();

});

async function loadPending(){

const list = document.getElementById("list");

const q = query(
collection(db,"businessSubmissions"),
where("status","==","pending")
);

const snap = await getDocs(q);

list.innerHTML = "";

if(snap.empty){
list.innerHTML = "<p>No pending submissions.</p>";
return;
}

snap.forEach(docSnap=>{

const data = docSnap.data();

const div = document.createElement("div");

div.className = "card";

div.innerHTML = `
<h3>${data.title || ""}</h3>

<p><b>Email:</b> ${data.email || ""}</p>

<p><b>Category:</b> ${data.category || ""}</p>

<p><b>Promotion:</b> ${data.promotionType || "affiliate"}</p>

<p><b>Status:</b> ${data.status}</p>

<p>${data.shortDescription || ""}</p>

${data.paymentProof ? `
<h4>Payment Screenshot</h4>
<img src="${data.paymentProof}">
` : `
<p>No payment screenshot uploaded.</p>
`}

<br>

<button
class="approve"
onclick="approveSubmission('${docSnap.id}')">
Approve
</button>

<button
class="reject"
onclick="rejectSubmission('${docSnap.id}')">
Reject
</button>
`;

list.appendChild(div);

});

}

window.approveSubmission = async function(id){

const ref = doc(db,"businessSubmissions",id);

const snap = await getDoc(ref);

if(!snap.exists()){
alert("Submission not found");
return;
}

const data = snap.data();

if(
data.promotionType === "sponsored"
&& !data.paymentProof
){
alert("Sponsored post requires payment screenshot.");
return;
}

await setDoc(
doc(db,"posts",id),
{
title:data.title,
category:data.category.toLowerCase(),
shortDescription:data.shortDescription,
longDescription:data.longDescription,
media:data.media || [],
affiliateLink:data.affiliateLink || "",
websiteUrl:data.websiteUrl || "",
isSponsored:data.promotionType==="sponsored",
views:0,
status:"published",
createdAt:serverTimestamp()
}
);

await updateDoc(ref,{
status:"approved"
});

alert("Post approved and published");

loadPending();

};

window.rejectSubmission = async function(id){

await updateDoc(
doc(db,"businessSubmissions",id),
{
status:"rejected"
}
);

alert("Post rejected");

loadPending();

};

</script></body>
</html>
