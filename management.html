<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Web Wardrobe CMS</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,Arial,sans-serif;
background:#f5f7fa;
padding:20px;
color:#111;
}

h1{
margin-bottom:20px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.tabs button{
background:#111;
color:white;
padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:14px;
box-shadow:0 3px 12px rgba(0,0,0,.08);
}

.card img{
width:100%;
max-height:350px;
object-fit:cover;
border-radius:10px;
margin-top:10px;
}

label{
display:block;
margin-top:10px;
font-weight:600;
}

input,
textarea,
select{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ddd;
border-radius:8px;
}

textarea{
min-height:140px;
}

.actions{
margin-top:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.approve{
background:green;
color:white;
}

.reject{
background:red;
color:white;
}

.save{
background:#ff9800;
color:white;
}

.restore{
background:#2196f3;
color:white;
}

.visit{
background:#111;
color:white;
}

.analytics{
background:purple;
color:white;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.small{
font-size:13px;
color:#666;
margin-top:5px;
}

</style>
</head>

<body>

<h1>Web Wardrobe CMS</h1>

<div class="tabs">

<button onclick="loadPending()">
Pending
</button>

<button onclick="loadApproved()">
Approved
</button>

<button onclick="loadRejected()">
Rejected
</button>

</div>

<div id="list">
Loading CMS...
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
query,
where,
getDocs,
getDoc,
doc,
setDoc,
updateDoc,
deleteDoc,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyBoSJggPoHfiI2quek_5mV5gPSAhSaXFZE",

authDomain:"web-wardrobe.firebaseapp.com",

projectId:"web-wardrobe",

storageBucket:"web-wardrobe.appspot.com",

messagingSenderId:"201587857341",

appId:"1:201587857341:web:044fe04f2503168881a4d4"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const ADMIN_EMAIL =
"admin@webwardrobe.name.ng";

function slugify(text){

return text
.toLowerCase()
.trim()
.replace(/[^a-z0-9\s-]/g,"")
.replace(/\s+/g,"-")
.replace(/-+/g,"-");

}

function safe(v){
return v || "";
}

auth.authStateReady().then(() => {

const user = auth.currentUser;

if(!user){
location.href = "login.html";
return;
}

if(
user.email.toLowerCase() !==
ADMIN_EMAIL.toLowerCase()
){
alert("Access denied");
location.href = "login.html";
return;
}

loadPending();

});
/* ==========================
   PENDING POSTS
========================== */

window.loadPending = async function(){

const list = document.getElementById("list");

list.innerHTML = "Loading pending submissions...";

const q = query(
collection(db,"businessSubmissions"),
where("status","==","pending")
);

const snap = await getDocs(q);

list.innerHTML = "";

if(snap.empty){

list.innerHTML =
"<p>No pending submissions.</p>";

return;

}

snap.forEach(docSnap=>{

const d = docSnap.data();

const card =
document.createElement("div");

card.className = "card";

card.innerHTML = `

<h2>${safe(d.title)}</h2>

<p class="small">
Submitted by:
${safe(d.email)}
</p>

<p class="small">
Category:
${safe(d.category)}
</p>

<p class="small">
Promotion:
${safe(d.promotionType)}
</p>

<label>Title</label>

<input
id="title-${docSnap.id}"
value="${safe(d.title)}">

<label>Slug</label>

<input
id="slug-${docSnap.id}"
value="${safe(d.slug)}">

<button
onclick="generateSlug('${docSnap.id}')">
Generate Slug
</button>

<label>Short Description</label>

<textarea
id="short-${docSnap.id}">${safe(d.shortDescription)}</textarea>

<label>Long Description</label>

<textarea
id="long-${docSnap.id}">${safe(d.longDescription)}</textarea>

<label>Website URL</label>

<input
id="website-${docSnap.id}"
value="${safe(d.websiteUrl)}">

<label>Affiliate URL</label>

<input
id="affiliate-${docSnap.id}"
value="${safe(d.affiliateLink)}">

<label>Reject Reason</label>

<input
id="reject-${docSnap.id}"
placeholder="Reason if rejected">

${d.media?.[0] ? `

<h3>Featured Image</h3>

<img src="${d.media[0]}">

` : ""}

${d.paymentProof ? `

<h3>Payment Proof</h3>

<img src="${d.paymentProof}">

` : ""}

<div class="actions">

<button
class="visit"
onclick="checkWebsite('${safe(d.websiteUrl)}')">
Visit Website
</button>

<button
class="visit"
onclick="checkAffiliate('${safe(d.affiliateLink)}')">
Visit Affiliate
</button>

<button
class="save"
onclick="savePending('${docSnap.id}')">
Save Changes
</button>

<button
class="approve"
onclick="approveSubmission('${docSnap.id}')">
Approve
</button>

<button
class="reject"
onclick="rejectSubmission('${docSnap.id}')">
Reject
</button>

</div>

`;

list.appendChild(card);

});

};

/* ==========================
   GENERATE SLUG
========================== */

window.generateSlug = function(id){

const title =
document.getElementById(`title-${id}`).value;

document.getElementById(
`slug-${id}`
).value = slugify(title);

};

/* ==========================
   LINK CHECKER
========================== */

window.checkWebsite = function(url){

if(!url){

alert("No website URL");

return;

}

window.open(url,"_blank");

};

window.checkAffiliate = function(url){

if(!url){

alert("No affiliate URL");

return;

}

window.open(url,"_blank");

};

/* ==========================
   SAVE EDITS
========================== */

window.savePending = async function(id){

await updateDoc(
doc(db,"businessSubmissions",id),
{
title:
document.getElementById(
`title-${id}`
).value,

slug:
document.getElementById(
`slug-${id}`
).value,

shortDescription:
document.getElementById(
`short-${id}`
).value,

longDescription:
document.getElementById(
`long-${id}`
).value,

websiteUrl:
document.getElementById(
`website-${id}`
).value,

affiliateLink:
document.getElementById(
`affiliate-${id}`
).value

}
);

alert("Changes saved");

};

/* ==========================
   APPROVE
========================== */

window.approveSubmission =
async function(id){

const ref =
doc(db,"businessSubmissions",id);

const snap =
await getDoc(ref);

if(!snap.exists()) return;

const d = snap.data();

const slug =
document.getElementById(
`slug-${id}`
).value
||
slugify(
document.getElementById(
`title-${id}`
).value
);

/* Create post */

await setDoc(
doc(db,"posts",id),
{

title:
document.getElementById(
`title-${id}`
).value,

slug,

category:
(d.category || "")
.toLowerCase(),

shortDescription:
document.getElementById(
`short-${id}`
).value,

longDescription:
document.getElementById(
`long-${id}`
).value,

media:
d.media || [],

affiliateLink:
document.getElementById(
`affiliate-${id}`
).value,

websiteUrl:
document.getElementById(
`website-${id}`
).value,

isSponsored:
d.promotionType ===
"sponsored",

status:"published",

views:0,

createdAt:
serverTimestamp()

}
);

/* Mark approved */

await updateDoc(ref,{

status:"approved",

slug

});

alert(
"Post approved successfully"
);

loadPending();

};

/* ==========================
   REJECT
========================== */

window.rejectSubmission =
async function(id){

const reason =
document.getElementById(
`reject-${id}`
).value;

await updateDoc(
doc(
db,
"businessSubmissions",
id
),
{
status:"rejected",
rejectReason:
reason ||
"No reason provided"
}
);

alert("Post rejected");

loadPending();

};

/* ==========================
   APPROVED POSTS
========================== */

window.loadApproved = async function(){

const list =
document.getElementById("list");

list.innerHTML =
"Loading approved posts...";

const q = query(
collection(db,"businessSubmissions"),
where("status","==","approved")
);

const snap =
await getDocs(q);

list.innerHTML = "";

if(snap.empty){

list.innerHTML =
"<p>No approved posts.</p>";

return;

}

snap.forEach(docSnap=>{

const d = docSnap.data();

const card =
document.createElement("div");

card.className = "card";

card.innerHTML = `

<h2>${safe(d.title)}</h2>

<p class="small">
Slug: ${safe(d.slug)}
</p>

<p class="small">
Category: ${safe(d.category)}
</p>

<p class="small">
Status: APPROVED
</p>

<label>Title</label>
<input
id="approved-title-${docSnap.id}"
value="${safe(d.title)}">

<label>Slug</label>
<input
id="approved-slug-${docSnap.id}"
value="${safe(d.slug)}">

<label>Short Description</label>
<textarea
id="approved-short-${docSnap.id}">${safe(d.shortDescription)}</textarea>

<label>Long Description</label>
<textarea
id="approved-long-${docSnap.id}">${safe(d.longDescription)}</textarea>

<label>Website URL</label>
<input
id="approved-website-${docSnap.id}"
value="${safe(d.websiteUrl)}">

<label>Affiliate URL</label>
<input
id="approved-affiliate-${docSnap.id}"
value="${safe(d.affiliateLink)}">

${d.media?.[0] ? `
<img src="${d.media[0]}">
` : ""}

<div id="analytics-${docSnap.id}"
class="small">
Loading analytics...
</div>

<div class="actions">

<button
class="visit"
onclick="openLivePost('${safe(d.slug)}')">
Open Live Post
</button>

<button
class="analytics"
onclick="loadAnalytics('${docSnap.id}')">
Refresh Analytics
</button>

<button
class="save"
onclick="saveApproved('${docSnap.id}')">
Save Changes
</button>

<button
class="reject"
onclick="moveApprovedToRejected('${docSnap.id}')">
Reject
</button>

<button
class="restore"
onclick="restoreApprovedToPending('${docSnap.id}')">
Move To Pending
</button>

</div>

`;

list.appendChild(card);

loadAnalytics(docSnap.id);

});

};

/* ==========================
   ANALYTICS
========================== */

window.loadAnalytics =
async function(id){

const postSnap =
await getDoc(
doc(db,"posts",id)
);

const el =
document.getElementById(
`analytics-${id}`
);

if(!postSnap.exists()){

el.innerHTML =
"Post not found in posts collection";

return;

}

const d =
postSnap.data();

el.innerHTML = `

Views:
${d.views || 0}

<br>

Status:
${d.status || "published"}

`;

};

/* ==========================
   OPEN LIVE POST
========================== */

window.openLivePost =
function(slug){

if(!slug){

alert("No slug found");

return;

}

window.open(
`https://www.webwardrobe.name.ng/post.html?slug=${slug}`,
"_blank"
);

};

/* ==========================
   SAVE APPROVED
========================== */

window.saveApproved =
async function(id){

const title =
document.getElementById(
`approved-title-${id}`
).value;

const slug =
document.getElementById(
`approved-slug-${id}`
).value;

const shortDescription =
document.getElementById(
`approved-short-${id}`
).value;

const longDescription =
document.getElementById(
`approved-long-${id}`
).value;

const websiteUrl =
document.getElementById(
`approved-website-${id}`
).value;

const affiliateLink =
document.getElementById(
`approved-affiliate-${id}`
).value;

/* update submission */

await updateDoc(
doc(db,"businessSubmissions",id),
{
title,
slug,
shortDescription,
longDescription,
websiteUrl,
affiliateLink
}
);

/* update live post */

await updateDoc(
doc(db,"posts",id),
{
title,
slug,
shortDescription,
longDescription,
websiteUrl,
affiliateLink
}
);

alert(
"Live post updated"
);

};

/* ==========================
   APPROVED -> REJECTED
========================== */

window.moveApprovedToRejected =
async function(id){

await updateDoc(
doc(
db,
"businessSubmissions",
id
),
{
status:"rejected"
}
);

await updateDoc(
doc(
db,
"posts",
id
),
{
status:"rejected"
}
);

alert(
"Moved to rejected"
);

loadApproved();

};

/* ==========================
   APPROVED -> PENDING
========================== */

window.restoreApprovedToPending =
async function(id){

await updateDoc(
doc(
db,
"businessSubmissions",
id
),
{
status:"pending"
}
);

alert(
"Moved back to pending"
);

loadApproved();

};

/* ==========================
   REJECTED POSTS
========================== */

window.loadRejected = async function(){

const list =
document.getElementById("list");

list.innerHTML =
"Loading rejected posts...";

const q = query(
collection(db,"businessSubmissions"),
where("status","==","rejected")
);

const snap =
await getDocs(q);

list.innerHTML = "";

if(snap.empty){

list.innerHTML =
"<p>No rejected posts.</p>";

return;

}

snap.forEach(docSnap=>{

const d = docSnap.data();

const card =
document.createElement("div");

card.className = "card";

card.innerHTML = `

<h2>${safe(d.title)}</h2>

<p class="small">
Category:
${safe(d.category)}
</p>

<p class="small">
Slug:
${safe(d.slug)}
</p>

<p class="small">
Reject Reason:
${safe(d.rejectReason)}
</p>

${d.media?.[0] ? `
<img src="${d.media[0]}">
` : ""}

<div class="actions">

<button
class="restore"
onclick="restoreRejected('${docSnap.id}')">
Restore To Pending
</button>

<button
class="approve"
onclick="approveRejected('${docSnap.id}')">
Approve
</button>

<button
class="reject"
onclick="deleteRejected('${docSnap.id}')">
Delete Permanently
</button>

</div>

`;

list.appendChild(card);

});

};

/* ==========================
   REJECTED -> PENDING
========================== */

window.restoreRejected =
async function(id){

await updateDoc(
doc(
db,
"businessSubmissions",
id
),
{
status:"pending"
}
);

alert(
"Restored to pending"
);

loadRejected();

};

/* ==========================
   REJECTED -> APPROVED
========================== */

window.approveRejected =
async function(id){

const ref =
doc(
db,
"businessSubmissions",
id
);

const snap =
await getDoc(ref);

if(!snap.exists()) return;

const d =
snap.data();

const slug =
d.slug ||
slugify(d.title);

/* publish again */

await setDoc(
doc(db,"posts",id),
{

title:d.title,

slug,

category:
(d.category || "")
.toLowerCase(),

shortDescription:
d.shortDescription || "",

longDescription:
d.longDescription || "",

media:
d.media || [],

websiteUrl:
d.websiteUrl || "",

affiliateLink:
d.affiliateLink || "",

isSponsored:
d.promotionType ===
"sponsored",

views:0,

status:"published",

createdAt:
serverTimestamp()

}
);

/* mark approved */

await updateDoc(ref,{
status:"approved",
slug
});

alert(
"Approved successfully"
);

loadRejected();

};

/* ==========================
   DELETE REJECTED
========================== */

window.deleteRejected =
async function(id){

const confirmed =
confirm(
"Delete permanently?"
);

if(!confirmed) return;

await deleteDoc(
doc(
db,
"businessSubmissions",
id
)
);

alert(
"Deleted permanently"
);

loadRejected();

};

</script>

</body>
</html>
