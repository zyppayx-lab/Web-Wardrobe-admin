<!DOCTYPE html>
<html>
<head>
<title>Web Wardrobe CMS (Stable Build)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#f4f6f8;
padding:20px;
color:#111;
}

h2{margin-bottom:10px;}

.topbar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

img{
max-width:100%;
border-radius:10px;
margin-top:10px;
}

input, textarea{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:1px solid #ddd;
}

.small{font-size:13px;color:#666;}

.approve{background:green;color:white;}
.reject{background:red;color:white;}
.save{background:orange;color:white;}
.view{background:#007bff;color:white;}
</style>
</head>

<body>

<h2>Web Wardrobe CMS</h2>

<div class="topbar">
<button onclick="loadPosts('pending')">Pending</button>
<button onclick="loadPosts('published')">Published</button>
<button onclick="loadPosts('rejected')">Rejected</button>
</div>

<div id="list">Loading admin panel...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
getFirestore,
collection,
query,
where,
getDocs,
doc,
getDoc,
updateDoc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "YOUR_REAL_API_KEY",
authDomain: "web-wardrobe.firebaseapp.com",
projectId: "web-wardrobe",
storageBucket: "web-wardrobe.appspot.com",
messagingSenderId: "201587857341",
appId: "1:201587857341:web:044fe04f2503168881a4d4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "admin@webwardrobe.name.ng";

/* 🔥 FIX: SAFE AUTH (NO RANDOM LOGOUT) */
function waitAuth() {
return new Promise((resolve) => {
const unsub = onAuthStateChanged(auth, (user) => {
unsub();
resolve(user);
});
});
}

/* START APP */
(async function () {

document.getElementById("list").innerHTML = "Checking admin session...";

const user = await waitAuth();

if (!user) {
location.href = "login.html";
return;
}

const email = (user.email || "").toLowerCase().trim();
const admin = ADMIN_EMAIL.toLowerCase().trim();

if (email !== admin) {
alert("Access denied");
location.href = "login.html";
return;
}

loadPosts("pending");

})();

/* SLUG */
function slugify(text){
return (text || "")
.toLowerCase()
.trim()
.replace(/[^a-z0-9\s-]/g,"")
.replace(/\s+/g,"-")
.replace(/-+/g,"-")
.substring(0,80);
}

function makeSlug(title, id){
return `${slugify(title)}-${id.slice(0,6)}`;
}

/* LOAD POSTS */
window.loadPosts = async function(status){

const list = document.getElementById("list");
list.innerHTML = "Loading...";

const q = query(
collection(db,"posts"),
where("status","==",status)
);

const snap = await getDocs(q);

list.innerHTML = "";

if(snap.empty){
list.innerHTML = "<p>No posts found.</p>";
return;
}

snap.forEach(docSnap => {

const d = docSnap.data();

const div = document.createElement("div");
div.className = "card";

div.innerHTML = `
<h3>${d.title || ""}</h3>

<p class="small">Slug: ${d.slug || "none"}</p>
<p class="small">Category: ${d.category || ""}</p>
<p class="small">Views: ${d.views || 0}</p>

<img src="${d.media?.[0] || ""}">

<label>Title</label>
<input id="title-${docSnap.id}" value="${d.title || ""}">

<label>Slug</label>
<input id="slug-${docSnap.id}" value="${d.slug || ""}">

<label>Short Description</label>
<textarea id="short-${docSnap.id}">${d.shortDescription || ""}</textarea>

<label>Full Content</label>
<textarea id="long-${docSnap.id}">${d.longDescription || ""}</textarea>

<label>Website URL</label>
<input id="web-${docSnap.id}" value="${d.websiteUrl || ""}">

<label>Affiliate Link</label>
<input id="aff-${docSnap.id}" value="${d.affiliateLink || ""}">

<div style="margin-top:10px;">
<button class="view" onclick="openLink('${d.websiteUrl || ""}')">Open Link</button>
<button class="save" onclick="savePost('${docSnap.id}')">Save</button>
<button class="approve" onclick="publish('${docSnap.id}')">Publish</button>
<button class="reject" onclick="reject('${docSnap.id}')">Reject</button>
</div>
`;

list.appendChild(div);
});

};

/* OPEN LINK */
window.openLink = function(url){
if(!url) return alert("No URL");
window.open(url,"_blank");
};

/* SAVE EDITS */
window.savePost = async function(id){

await updateDoc(doc(db,"posts",id),{
title: document.getElementById(`title-${id}`).value,
slug: document.getElementById(`slug-${id}`).value,
shortDescription: document.getElementById(`short-${id}`).value,
longDescription: document.getElementById(`long-${id}`).value,
websiteUrl: document.getElementById(`web-${id}`).value,
affiliateLink: document.getElementById(`aff-${id}`).value,
updatedAt: Date.now()
});

alert("Saved successfully");
};

/* PUBLISH */
window.publish = async function(id){

const ref = doc(db,"posts",id);
const snap = await getDoc(ref);

if(!snap.exists()) return;

const d = snap.data();

const slug = d.slug || makeSlug(d.title,id);

await updateDoc(ref,{
status:"published",
slug,
publishedAt: Date.now()
});

alert("Published");
loadPosts("pending");
};

/* REJECT */
window.reject = async function(id){

await updateDoc(doc(db,"posts",id),{
status:"rejected"
});

alert("Rejected");
loadPosts("pending");
};

</script>

</body>
</html>
