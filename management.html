<!DOCTYPE html>
<html>
<head>
<title>Management | Web Wardrobe</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

img{
max-width:100%;
margin-top:10px;
border-radius:10px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

.approve{background:green;color:white;}
.reject{background:red;color:white;}
.view{background:#007bff;color:white;}
.edit{background:#111;color:white;color:white;}

input, textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ddd;
}

.small{
font-size:13px;
color:#555;
}
</style>
</head>

<body>

<h2>Admin Management Panel</h2>
<a href="dashboard.html">← Back</a>

<div id="list">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
query,
where,
getDocs,
doc,
getDoc,
updateDoc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyBoSJggPoHfiI2quek_5mV5gPSAhSaXFZE",
authDomain: "web-wardrobe.firebaseapp.com",
projectId: "web-wardrobe",
storageBucket: "web-wardrobe.appspot.com",
messagingSenderId: "201587857341",
appId: "1:201587857341:web:044fe04f2503168881a4d4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "admin@webwardrobe.name.ng";

/* 🔥 FIX 1: SAFE AUTH HANDLING (NO AUTO FALSE REDIRECT) */
function waitForAuth() {
return new Promise((resolve) => {
const unsub = onAuthStateChanged(auth, (user) => {
unsub();
resolve(user);
});
});
}

/* START APP ONLY AFTER AUTH IS READY */
(async () => {

const user = await waitForAuth();

if (!user) {
location.href = "login.html";
return;
}

if (user.email !== ADMIN_EMAIL) {
alert("Access denied");
location.href = "login.html";
return;
}

loadPending();

})();

/* LOAD PENDING POSTS */
async function loadPending(){

const list = document.getElementById("list");

const q = query(
collection(db,"businessSubmissions"),
where("status","==","pending")
);

const snap = await getDocs(q);

list.innerHTML = "";

if(snap.empty){
list.innerHTML = "<p>No pending posts.</p>";
return;
}

snap.forEach(docSnap=>{

const d = docSnap.data();

const div = document.createElement("div");
div.className = "card";

div.innerHTML = `
<h3>${d.title}</h3>

<p class="small"><b>Category:</b> ${d.category}</p>
<p class="small"><b>Email:</b> ${d.email}</p>
<p class="small"><b>Type:</b> ${d.promotionType}</p>

<h4>Short Description</h4>
<p>${d.shortDescription}</p>

<h4>Full Content</h4>
<p>${d.longDescription}</p>

<h4>Image</h4>
<img src="${d.media?.[0] || ''}">

${d.websiteUrl ? `
<h4>Website</h4>
<a href="${d.websiteUrl}" target="_blank">Open Link</a>
` : ""}

${d.paymentProof ? `
<h4>Payment Proof</h4>
<img src="${d.paymentProof}">
` : ""}

<h4>Reject Reason</h4>
<input id="reason-${docSnap.id}" placeholder="Optional reason">

<br>

<button class="view" onclick="openLink('${d.websiteUrl || ""}')">Check Link</button>
<button class="approve" onclick="approve('${docSnap.id}')">Approve</button>
<button class="reject" onclick="reject('${docSnap.id}')">Reject</button>

`;

list.appendChild(div);

});

}

/* SAFE LINK CHECK */
window.openLink = function(url){
if(!url){
alert("No URL provided");
return;
}
window.open(url, "_blank");
};

/* APPROVE POST */
window.approve = async function(id){

const ref = doc(db,"businessSubmissions",id);
const snap = await getDoc(ref);

if(!snap.exists()) return;

const d = snap.data();

/* slug generator */
function slugify(text){
return text.toLowerCase()
.trim()
.replace(/[^a-z0-9\s-]/g,"")
.replace(/\s+/g,"-")
.replace(/-+/g,"-");
}

const slug = slugify(d.title || "");

/* publish to posts collection */
await setDoc(doc(db,"posts",id),{
title: d.title,
slug,
category: (d.category || "lifestyle").toLowerCase(),
shortDescription: d.shortDescription,
longDescription: d.longDescription,
media: d.media || [],

affiliateLink: d.affiliateLink || "",
websiteUrl: d.websiteUrl || "",

isSponsored: d.promotionType === "sponsored",

status: "published",
views: 0,

createdAt: Date.now(),
updatedAt: Date.now()
});

/* mark submission approved */
await updateDoc(ref,{
status:"approved"
});

alert("Post published successfully");
loadPending();
};

/* REJECT POST */
window.reject = async function(id){

const reason = document.getElementById(`reason-${id}`).value;

await updateDoc(doc(db,"businessSubmissions",id),{
status:"rejected",
rejectReason: reason || "No reason provided"
});

alert("Post rejected");
loadPending();
};

</script>

</body>
  </html>
