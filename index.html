<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | Web Wardrobe</title>

<style>
body{
  font-family:Arial, sans-serif;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.box{
  background:white;
  padding:30px;
  border-radius:14px;
  width:320px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
  margin-bottom:20px;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #ddd;
  border-radius:10px;
}

button{
  width:100%;
  padding:12px;
  background:#e60023;
  color:white;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.msg{
  margin-top:15px;
  text-align:center;
  font-size:14px;
  color:#444;
}
</style>
</head>

<body>

<div class="box">
  <h2>Admin Login</h2>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div class="msg" id="msg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, 
  signInWithEmailAndPassword 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* Firebase Config */
const firebaseConfig = {
  apiKey: "AIzaSyBoSJggPoHfiI2quek_5m5GPSAhSaXFZE",
  authDomain: "web-wardrobe.firebaseapp.com",
  projectId: "web-wardrobe",
  storageBucket: "web-wardrobe.appspot.com",
  messagingSenderId: "201587857341",
  appId: "1:201587857341:web:044fe04f2503168881a4d4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* 🔐 ADMIN WHITELIST */
const ADMIN_EMAILS = [
  "youradmin@email.com"
];

async function login(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("msg");

  if(!email || !password){
    msg.textContent = "Enter email and password";
    return;
  }

  try {
    const userCred = await signInWithEmailAndPassword(auth, email, password);
    const user = userCred.user;

    /* WHITELIST CHECK */
    if(!ADMIN_EMAILS.includes(user.email)){
      msg.textContent = "Access denied (not admin)";
      await auth.signOut();
      return;
    }

    msg.textContent = "Login successful... redirecting";
    window.location.href = "dashboard.html";

  } catch (error) {
    msg.textContent = "Login failed: " + error.message;
    console.error(error);
  }
}

/* expose to button */
window.login = login;
</script>

</body>
</html>
