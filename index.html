<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;background:#f5f5f5;display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:white;padding:30px;border-radius:12px;width:300px}
input{width:100%;padding:10px;margin:10px 0}
button{width:100%;padding:10px;background:#e60023;color:white;border:none}
</style>
</head>
<body>

<div class="box">
<h2>Admin Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyBoSJggPoHfiI2quek_5m5G9PSAhSaXFZE",
authDomain:"web-wardrobe.firebaseapp.com",
projectId:"web-wardrobe",
appId:"1:201587857341:web:044fe04f2503168881a4d4"
});

const auth = getAuth(app);

window.login = async function(){
const email = document.getElementById("email").value;
const pass = document.getElementById("password").value;

await signInWithEmailAndPassword(auth,email,pass);

location.href="dashboard.html";
};
</script>

</body>
  </html>
